server:
  port: 9092

spring:
  profiles:
    active: local

  application:
    name: FOOD-CATALOGUE-SERVICE

  datasource:
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  cloud:
    loadbalancer:
      config:
        enabled: true